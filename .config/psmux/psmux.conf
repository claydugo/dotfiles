# psmux — native Windows terminal multiplexer (tmux for PowerShell/ConPTY).
# Mirrors ~/.config/tmux/tmux.conf so the same muscle memory works on Windows.
# psmux does NOT read $XDG_CONFIG_HOME/tmux/tmux.conf, so this dedicated config
# lives at ~/.config/psmux/psmux.conf (bootstrap symlinks it from the repo).
#
# Only the Linux-specific bits differ from the tmux config:
#   - copy-pipe uses clip.exe instead of xclip
#   - the htop/nvtop/scratch popups call PowerShell helpers (see ./*.ps1)
#   - the SSH-prefix-remap block is dropped (irrelevant on a local Windows box)

set -g default-shell "C:/Program Files/PowerShell/7/pwsh.exe"

unbind-key C-b
set -g prefix C-w
set -g default-terminal "tmux-256color"
set -as terminal-features ',*:RGB'
set-option -g focus-events on

bind v split-window -v -c "#{pane_current_path}"
bind s split-window -h -c "#{pane_current_path}"
bind e new-window -c "#{pane_current_path}"
bind c new-window -c ~/
bind C-w send-prefix

set -g history-limit 10000000
set -g mouse on
set -g set-clipboard on
set -g status-keys vi
set -g mode-keys vi
set -g renumber-windows on

set -g status-position bottom
set -g base-index 1
# NOTE: psmux 3.3.4 ignores status-style from the config file — it re-applies its
# default (green) after parsing, so this line has no effect yet (prefix and the
# other options here work fine). Kept for when it's fixed upstream. Until then,
# run once per server to get the readable bar:
#   psmux set -g status-style "bg=black,fg=colour245"
set -g status-style "bg=black,fg=colour245"
set -g status-left-length 50
set -g mode-style "fg=white, bg=colour233"
set-option -g status-right ""
set-window-option -g window-status-current-style fg=white

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe "clip.exe"
bind-key -T copy-mode-vi M-x kill-pane
bind-key -T copy-mode-vi M-X kill-window

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n M-X kill-window
bind -n M-x kill-pane
bind -n M-c new-window -c ~/
bind -n M-e new-window -c "#{pane_current_path}"

bind -n M-v split-window -v -c "#{pane_current_path}"
bind -n M-s split-window -h -c "#{pane_current_path}"

bind -n M-z resize-pane -Z

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

bind -n M-m set-window-option synchronize-panes

bind -n M-f copy-mode
bind -n M-t choose-tree
bind -n M-y choose-session

# Popups: Linux tools (htop/nvtop) and the bash scratch-file one-liner don't
# exist on Windows, so these call PowerShell equivalents next to this file.
bind -n M-g display-popup -E -w 90% -h 85% 'pwsh -NoLogo -NoProfile -Command "& $HOME\.config\psmux\top.ps1"'
bind -n M-b display-popup -E -w 90% -h 85% "nvidia-smi -l 1"
bind -n M-n display-popup -E -w 80% -h 85% 'pwsh -NoLogo -NoProfile -Command "& $HOME\.config\psmux\scratch.ps1"'
