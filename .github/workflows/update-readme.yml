name: Update README

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write # commits the regenerated README back to main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # the push step below needs the persisted token
          persist-credentials: true # zizmor: ignore[artipacked]

      - name: Install tree
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Generate README
        run: ./scripts/generate_readme.sh > README.md

      - name: Check for changes
        id: changes
        run: git diff --quiet README.md || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |-
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: auto-update README [skip ci]"
          git push
