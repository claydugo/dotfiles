name: GitGuardian

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 0 # full history needed to scan past commits

      - name: Run gg-shield
        uses: GitGuardian/ggshield-action@ad41d391f42450e9e6bb34961e3b1cf73398f250 # v1.51.0
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          # Set GITGUARDIAN_API_KEY in repo secrets:
          # https://dashboard.gitguardian.com/api/personal-access-tokens
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
